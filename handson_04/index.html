<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Portal - Hands-On 4</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">

            <h2>🎓 Student Portal</h2>

        </div>

        <nav>

            <ul>

                <li><a href="#">Home</a></li>

                <li><a href="#">Courses</a></li>

                <li><a href="#">Notifications</a></li>

                <li><a href="#">Profile</a></li>

            </ul>

        </nav>

    </header>

    <!-- Hero Section -->

    <section id="hero">

        <h1>Welcome to Student Portal</h1>

        <p>

            Stay updated with the latest announcements fetched from an online API
            using the JavaScript Fetch API.

        </p>

    </section>

    <!-- Notification Section -->

    <section class="notification-section">

        <h2>Latest Notifications</h2>

        <div class="button-group">

            <button id="loadBtn">

                📥 Load Notifications

            </button>

            <button id="retryBtn">

                🔄 Retry

            </button>

        </div>

        <p id="loading"></p>

        <div id="notificationContainer">

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <p>

            © 2026 Student Portal | Frontend Development Hands-On 4

        </p>

    </footer>

    <script src="app.js"></script>

</body>

</html>
