<div class="catalog-workspace">
  
  <h1 class="page-title">Available Courses</h1>

  <div class="search-wrapper">
    <input 
      type="text" 
      placeholder="Search courses..." 
      class="search-input"
    />
  </div>

  <div class="course-container" *ngIf="!isLoading">
    <div class="course-card" *ngFor="let course of courses">
      
      <h3 class="course-name">{{ course.name }}</h3>

      <div class="course-details-block">
        <p><strong>Instructor:</strong> {{ course.instructor }}</p>
        <p><strong>Credits:</strong> {{ course.credits }}</p>
      </div>

      <div class="card-footer">
        <button class="btn-action" [routerLink]="['/courses', course.id]">
          View Details
        </button>
      </div>

    </div>
  </div>

  <div *ngIf="isLoading" class="loading-matrix">
    <div class="spinner-element"></div>
    <p>Synchronizing Institutional Remote Matrix Data...</p>
  </div>

</div>
